<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pritesh Singh - DevOps Engineer. An interactive terminal portfolio: type commands to explore.">
  <title>pritesh@portfolio:~$</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="window" role="application" aria-label="Interactive terminal portfolio">
    <div class="titlebar">
      <div class="tb-dots"><span class="r"></span><span class="y"></span><span class="g"></span></div>
      <div class="tb-title">pritesh@portfolio: ~ — zsh</div>
      <div class="tb-right">
        <button id="themeBtn" title="toggle theme">◐</button>
      </div>
    </div>

    <div id="screen" class="screen" tabindex="0">
      <div id="output" class="output"></div>
      <div class="input-line" id="inputLine">
        <span class="prompt" id="prompt"></span>
        <span class="cmd-wrap">
          <span id="typed" class="typed"></span><span class="caret" id="caret">▍</span>
        </span>
        <input id="cmd" class="hidden-input" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="terminal input" />
      </div>
    </div>

    <div class="hintbar" id="hintbar">
      <span class="hint-label">try:</span>
      <button data-cmd="help">help</button>
      <button data-cmd="ls">ls</button>
      <button data-cmd="experience">experience</button>
      <button data-cmd="skills">skills</button>
      <button data-cmd="kubectl get pods">kubectl get pods</button>
      <button data-cmd="terraform apply">terraform apply</button>
      <button data-cmd="contact">contact</button>
      <button data-cmd="neofetch">neofetch</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
